<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">

  <defs>
    <radialGradient id="ball" cx="40%" cy="34%" r="78%">
      <stop offset="0%"  stop-color="#ffffff"/>
      <stop offset="68%" stop-color="#f5f5ef"/>
      <stop offset="100%" stop-color="#e2e2d8"/>
    </radialGradient>
    <linearGradient id="ribbon" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ffd34d"/>
      <stop offset="100%" stop-color="#f5b301"/>
    </linearGradient>
    <radialGradient id="bg" cx="50%" cy="38%" r="75%">
      <stop offset="0%"  stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#0b6e34"/>
    </radialGradient>
    <clipPath id="ballClip"><circle cx="256" cy="256" r="200"/></clipPath>
    <clipPath id="mouthClip">
      <path d="M212,290 Q256,300 300,290 C298,332 277,350 256,350 C235,350 214,332 212,290 Z"/>
    </clipPath>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDev="9" flood-color="#000000" flood-opacity="0.22"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">

  <!-- sombra inferior del balón -->
  <ellipse cx="256" cy="468" rx="150" ry="22" fill="#000000" opacity="0.12"/>

  <!-- balón -->
  <circle cx="256" cy="256" r="200" fill="url(#ball)" stroke="#cfcfc4" stroke-width="3"/>

  <!-- parches + costuras recortados al balón -->
  <g clip-path="url(#ballClip)">
    <polygon points="256.0,54.0 299.7,85.8 283.0,137.2 229.0,137.2 212.3,85.8" fill="#1a1a1a"/>
<polygon points="96.0,212.0 132.1,238.3 118.3,280.7 73.7,280.7 59.9,238.3" fill="#1a1a1a"/>
<polygon points="416.0,212.0 452.1,238.3 438.3,280.7 393.7,280.7 379.9,238.3" fill="#1a1a1a"/>
<polygon points="150.0,358.0 182.3,381.5 170.0,419.5 130.0,419.5 117.7,381.5" fill="#1a1a1a"/>
<polygon points="362.0,358.0 394.3,381.5 382.0,419.5 342.0,419.5 329.7,381.5" fill="#1a1a1a"/>
    
      <g stroke="#d4d4ca" stroke-width="4" stroke-linecap="round" opacity="0.85" fill="none">
        <line x1="212" y1="82"  x2="96"  y2="212"/>
        <line x1="300" y1="82"  x2="416" y2="212"/>
        <line x1="118" y1="281" x2="150" y2="358"/>
        <line x1="394" y1="281" x2="362" y2="358"/>
      </g>
    <!-- brillo superior -->
    <ellipse cx="196" cy="158" rx="92" ry="60" fill="#ffffff" opacity="0.35"/>
    <!-- sombra inferior interna -->
    <ellipse cx="256" cy="300" rx="200" ry="170" fill="#000000" opacity="0.05"/>
  </g>

  <!-- ojos -->
  <g>
    <ellipse cx="210" cy="212" rx="22" ry="26" fill="#ffffff" stroke="#1a1a1a" stroke-width="3.5"/>
    <ellipse cx="302" cy="212" rx="22" ry="26" fill="#ffffff" stroke="#1a1a1a" stroke-width="3.5"/>
    <circle cx="215" cy="217" r="11.5" fill="#1a1a1a"/>
    <circle cx="307" cy="217" r="11.5" fill="#1a1a1a"/>
    <circle cx="210" cy="210" r="4.2" fill="#ffffff"/>
    <circle cx="302" cy="210" r="4.2" fill="#ffffff"/>
  </g>

  <!-- boca (sonrisa abierta) -->
  <g clip-path="url(#mouthClip)">
    <path id="mouth" d="M212,290 Q256,300 300,290 C298,332 277,350 256,350 C235,350 214,332 212,290 Z" fill="#3a2c28"/>
    <ellipse cx="256" cy="344" rx="26" ry="16" fill="#ef5d6a"/>
    <path d="M218,292 Q256,301 294,292 L291,304 Q256,310 221,304 Z" fill="#ffffff"/>
  </g>
  <path d="M212,290 Q256,300 300,290 C298,332 277,350 256,350 C235,350 214,332 212,290 Z"
        fill="none" stroke="#1a1a1a" stroke-width="3.5"/>

  <!-- mejillas -->
  <ellipse cx="168" cy="278" rx="15" ry="10" fill="#ef5d6a" opacity="0.35"/>
  <ellipse cx="344" cy="278" rx="15" ry="10" fill="#ef5d6a" opacity="0.35"/>

  <!-- banderín "26" -->
  <g>
    <polygon points="150,392 124,392 138,414 124,436 150,436" fill="#c98a00"/>
    <polygon points="362,392 388,392 374,414 388,436 362,436" fill="#c98a00"/>
    <rect x="150" y="386" width="212" height="56" rx="14" fill="url(#ribbon)" stroke="#b97f00" stroke-width="2"/>
    <text x="256" y="427" font-family="DejaVu Sans, Arial, sans-serif" font-size="42"
          font-weight="bold" fill="#1a1a1a" text-anchor="middle" letter-spacing="2">26</text>
  </g>

  </g>
</svg>